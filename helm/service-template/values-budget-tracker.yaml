image:
  repository: defendersd/defender.budget-tracker
  tag: sha-064dc6d
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-budget-tracker
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal calls budget-tracker directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
