{{- if and (.Values.metrics.enabled | default false) (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/ServiceMonitor") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-metrics
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/part-of: defender
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.path | default "/metrics" }}
      interval: 30s
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_service_name
          targetLabel: service
        - sourceLabels:
            - __meta_kubernetes_namespace
          targetLabel: namespace
{{- end }}
