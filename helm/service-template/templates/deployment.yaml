apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
{{- $containerPort := .Values.service.targetPort | default .Values.service.port }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
{{- $metricsEnabled := .Values.metrics.enabled | default false }}
{{- $podAnnotations := .Values.podAnnotations | default dict }}
{{- if or $metricsEnabled $podAnnotations }}
      annotations:
{{- with $podAnnotations }}
{{- toYaml . | nindent 8 }}
{{- end }}
{{- if $metricsEnabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.metrics.port | toString | quote }}
{{- end }}
{{- end }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $containerPort }}
{{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
{{- end }}
{{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
{{- end }}
{{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
{{- end }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-env
          env:
            - name: Defender_App_MongoDBConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: Defender_App_MongoDBConnectionString
            - name: Defender_App_SecretsEncryptionKey
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: Defender_App_SecretsEncryptionKey
