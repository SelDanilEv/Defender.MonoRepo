image:
  repository: defendersd/defender.risk-games
  tag: sha-c0c0dbd
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-risk-games
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal calls risk-games directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
  cron:
    enabled: true
