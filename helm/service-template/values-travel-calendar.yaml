image:
  repository: defendersd/defender.travel-calendar
  tag: f7a8cedb8679172b186fa29b108b612d5dc0f2bc
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-travel-calendar
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal calls travel-calendar directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
probes:
  # TravelCalendarService exposes its unauthenticated health endpoint at /health.
  path: /health
