image:
  repository: defendersd/defender.health-care
  tag: sha-c0c0dbd
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-health-care
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal calls health-care directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
