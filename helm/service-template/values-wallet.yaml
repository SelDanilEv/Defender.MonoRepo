image:
  repository: defendersd/defender.wallet
  tag: sha-fc52fda
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-wallet
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal and RiskGames call wallet directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
  cron:
    enabled: true
