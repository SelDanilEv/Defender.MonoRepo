image:
  repository: defendersd/defender.personal-food-advisor
  tag: sha-6cb25b4
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-personal-food-advisor
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal calls personal-food-advisor directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
  cron:
    enabled: true
