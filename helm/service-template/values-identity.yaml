image:
  repository: defendersd/defender.identity
  tag: 20260711-181
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-identity
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Portal and other services call identity directly via *.svc.cluster.local.
  # KEDA HTTP wake-up only covers ingress/interceptor traffic, so this service
  # must keep one warm replica for synchronous internal calls.
  minReplicaCount: 1
  http:
    enabled: true
