image:
  repository: defendersd/defender.notification
  tag: sha-5faad6d
  pullPolicy: Always
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: argo-notification
      paths:
        - path: /
          pathType: Prefix
autoscaling:
  # Identity calls notification directly over cluster DNS.
  minReplicaCount: 1
  http:
    enabled: true
