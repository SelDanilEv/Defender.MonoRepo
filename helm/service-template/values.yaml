replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 90

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

metrics:
  enabled: true
  path: /metrics
  port: 8080

podAnnotations: {}

probes:
  path: /api/Home/health
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "125m"
    memory: "256Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

configMapData:
  ASPNETCORE_ENVIRONMENT: "Prod"
  Defender__Observability__Metrics__Enabled: "true"

secretName: basic-secret
