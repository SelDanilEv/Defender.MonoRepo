replicaCount: 1
autoscaling:
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 1200
  http:
    enabled: false
    scalerAddress: keda-add-ons-http-external-scaler.defender:9090
    concurrency:
      targetValue: 20
    interceptor:
      namespace: defender
      serviceName: keda-add-ons-http-interceptor-proxy
      servicePort: 8080
  cron:
    enabled: false
    timezone: Europe/Warsaw
    start: "0,30 * * * *"
    end: "10,40 * * * *"
    desiredReplicas: "1"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

metrics:
  enabled: false
  path: /metrics
  port: 8080

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  path: /health
  startup:
    enabled: true
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: "125m"
    memory: "256Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

configMapData:
  ASPNETCORE_ENVIRONMENT: "Prod"
  Defender__Observability__Metrics__Enabled: "false"
  # Keep JWT validation and token issuance configuration explicit at deployment
  # level. This prevents missing/empty audience values when appsettings files
  # are overridden or omitted from a production image.
  JwtTokenIssuer: "Defender"
  JwtTokenAudience: "defender-api"

secretName: basic-secret
