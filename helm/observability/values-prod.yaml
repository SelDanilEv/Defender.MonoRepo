global:
  environment: prod

kube-prometheus-stack:
  grafana:
    adminPassword: change-me-in-prod
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - grafana.defender.local
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

loki:
  singleBinary:
    persistence:
      enabled: true
      size: 100Gi

promtail:
  tolerations: []
