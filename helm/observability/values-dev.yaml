global:
  environment: dev

kube-prometheus-stack:
  prometheusOperator:
    admissionWebhooks:
      enabled: false
      patch:
        enabled: false
  grafana:
    ingress:
      enabled: false
  prometheus:
    prometheusSpec:
      retention: 7d

loki:
  singleBinary:
    persistence:
      enabled: false

promtail:
  tolerations: []
