apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-repo-server-network-policy
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server-network-policy
    app.kubernetes.io/part-of: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  policyTypes:
    - Ingress
  ingress:
    # Temporary recovery posture: allow repo-server gRPC from any in-cluster source.
    # This avoids selector-specific policy engine edge-cases that can deadlock Argo sync.
    - ports:
        - protocol: TCP
          port: 8081
    # Keep metrics reachable for namespace-level scraping/debugging.
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8084
