apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portal-mcp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: portal-mcp
    app.kubernetes.io/part-of: defender
spec:
  project: auto-deploy-dev
  source:
    repoURL: https://github.com/SelDanilEv/Defender.MonoRepo.git
    targetRevision: main
    path: helm/service-template
    helm:
      valueFiles:
        - values-portal-mcp.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: defender
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
