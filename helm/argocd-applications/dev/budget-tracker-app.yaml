apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: budget-tracker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: budget-tracker
    app.kubernetes.io/part-of: defender
    app.kubernetes.io/instance: budget-tracker
    defender.coded-by-danil.dev/sync-probe: "2026-05-02"
spec:
  project: auto-deploy-dev
  source:
    repoURL: https://github.com/SelDanilEv/Defender.MonoRepo.git
    targetRevision: main
    path: helm/service-template
    helm:
      valueFiles:
        - values-budget-tracker.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: defender
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
