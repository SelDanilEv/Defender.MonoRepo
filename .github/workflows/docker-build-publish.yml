name: Build and Publish Docker Images

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      service:
        description: "Specific service to build (or ALL for all services)"
        required: false
        default: "ALL"
        type: choice
        options:
          - "ALL"
          - "Defender.BudgetTracker"
          - "Defender.HealthCareService"
          - "Defender.TravelCalendarService"
          - "Defender.IdentityService"
          - "Defender.JobSchedulerService"
          - "Defender.NotificationService"
          - "Defender.PersonalFoodAdvisor"
          - "Defender.Portal"
          - "Defender.Portal.Mcp"
          - "Defender.RiskGamesService"
          - "Defender.UserManagementService"
          - "Defender.WalletService"
      force_build:
        description: "Force build even if no changes in src folder"
        required: false
        default: false
        type: boolean

env:
  DOCKER_REGISTRY: docker.io
  DOTNET_VERSION: 8.0
  TEST_DOTNET_VERSION: 10.0.x
  NODE_VERSION: 24

jobs:
  security-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET SDK for dependency audit
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.TEST_DOTNET_VERSION }}

      - name: Audit NuGet dependencies
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r project; do
            audit="$(mktemp)"
            dotnet list "$project" package --vulnerable --include-transitive --format json > "$audit"
            if jq -e '
              [.projects[]?.frameworks[]?
               | (.topLevelPackages[]?, .transitivePackages[]?)
               | .vulnerabilities[]?
               | select(.severity == "High" or .severity == "Critical")]
              | length > 0
            ' "$audit" > /dev/null; then
              echo "High or critical NuGet vulnerabilities found in $project:" >&2
              jq -r '
                .projects[]?.frameworks[]?
                | (.topLevelPackages[]?, .transitivePackages[]?)
                | select(.vulnerabilities)
                | .id as $id
                | .vulnerabilities[]?
                | select(.severity == "High" or .severity == "Critical")
                | "\\($id) [\\(.severity)] \\(.advisoryurl)"
              ' "$audit" >&2
              exit 1
            fi
          done < <(find src -name '*.csproj' -type f | sort)

      - name: Set up Node.js for dependency audit
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit Portal npm dependencies
        shell: bash
        working-directory: src/Defender.Portal/src/WebUI/ClientApp
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.4

      - name: Lint and render Helm delivery values
        shell: bash
        run: |
          chmod +x scripts/validate-helm-delivery.sh
          ./scripts/validate-helm-delivery.sh

      - name: Scan infrastructure configuration
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: '1'

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      src-changed: ${{ steps.filter.outputs.src-changed }}
      portal-changed: ${{ steps.portal-filter.outputs.portal-changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in src folder
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.force_build }}" == "true" ]; then
              echo "src-changed=true" >> $GITHUB_OUTPUT
              echo "Force build enabled, skipping src folder check"
            else
              BASE_SHA="${{ github.event.before }}"
              HEAD_SHA="${{ github.sha }}"
              
              if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
                echo "src-changed=true" >> $GITHUB_OUTPUT
                echo "No base commit found, assuming changes"
              else
                if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^src/"; then
                  echo "src-changed=true" >> $GITHUB_OUTPUT
                  echo "Changes detected in src folder"
                else
                  echo "src-changed=false" >> $GITHUB_OUTPUT
                  echo "No changes in src folder"
                fi
              fi
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "src-changed=true" >> $GITHUB_OUTPUT
            echo "Tag push detected, building all services"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^src/"; then
              echo "src-changed=true" >> $GITHUB_OUTPUT
              echo "Changes detected in src folder"
            else
              echo "src-changed=false" >> $GITHUB_OUTPUT
              echo "No changes in src folder"
            fi
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            
            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
              echo "src-changed=true" >> $GITHUB_OUTPUT
              echo "No base commit found, assuming changes"
            else
              if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^src/"; then
                echo "src-changed=true" >> $GITHUB_OUTPUT
                echo "Changes detected in src folder"
              else
                echo "src-changed=false" >> $GITHUB_OUTPUT
                echo "No changes in src folder"
              fi
            fi
          fi

      - name: Check for Portal build inputs
        id: portal-filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.service }}" in
              ""|"ALL"|"Defender.Portal") echo "portal-changed=true" >> "$GITHUB_OUTPUT" ;;
              *) echo "portal-changed=false" >> "$GITHUB_OUTPUT" ;;
            esac
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "portal-changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "portal-changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq '^(src/Defender\.Portal/|src/Dockerfile\.Portal$|src/Directory\.(Build\.(props|targets)|Packages\.props)$)'; then
            echo "portal-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "portal-changed=false" >> "$GITHUB_OUTPUT"
          fi

  test-shared-libraries:
    needs: check-changes
    if: needs.check-changes.outputs.src-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.TEST_DOTNET_VERSION }}

      - name: Validate NuGet egress
        shell: bash
        run: |
          chmod +x scripts/check-nuget-egress.sh
          ./scripts/check-nuget-egress.sh

      - name: Run shared library tests
        shell: bash
        run: |
          set -euo pipefail
          dotnet test src/Defender.Common/src/Tests/Defender.Common.Tests.csproj --configuration Release --nologo
          dotnet test src/Defender.Kafka/src/Tests/Defender.Kafka.Tests.csproj --configuration Release --nologo
          dotnet test src/Defender.DistributedCache/src/Tests/Defender.DistributedCache.Tests.csproj --configuration Release --nologo

  test-services:
    needs: check-changes
    if: needs.check-changes.outputs.src-changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.service == '' || github.event.inputs.service == 'ALL')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: "defender.portal"
            dockerfile: "Dockerfile.Portal"
            project_type: "WebUI"
            service_dir: "Defender.Portal"
          - name: "defender.portal-mcp"
            dockerfile: "Defender.Portal.Mcp/Dockerfile"
            project_type: "Node"
            service_dir: "Defender.Portal.Mcp"
          - name: "defender.user-management"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.UserManagementService"
          - name: "defender.wallet"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.WalletService"
          - name: "defender.risk-games"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.RiskGamesService"
          - name: "defender.notification"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.NotificationService"
          - name: "defender.personal-food-advisor"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.PersonalFoodAdvisor"
          - name: "defender.job-scheduler"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.JobSchedulerService"
          - name: "defender.identity"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.IdentityService"
          - name: "defender.budget-tracker"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.BudgetTracker"
          - name: "defender.health-care"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.HealthCareService"
          - name: "defender.travel-calendar"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.TravelCalendarService"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK for tests
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.TEST_DOTNET_VERSION }}

      - name: Validate NuGet egress
        shell: bash
        run: |
          chmod +x scripts/check-nuget-egress.sh
          ./scripts/check-nuget-egress.sh

      - name: Run unit tests
        id: run-tests
        shell: bash
        run: |
          SERVICE_DIR="${{ matrix.service.service_dir }}"
          echo "Searching for test projects under src/${SERVICE_DIR}"
          TEST_PROJECTS=$(find "src/${SERVICE_DIR}" -type f \( -name "*Tests*.csproj" -o -name "*.Tests.csproj" \))

          if [ -z "$TEST_PROJECTS" ]; then
            echo "No test projects found for ${SERVICE_DIR}; skipping tests."
            exit 0
          fi

          mkdir -p TestResults
          for project in $TEST_PROJECTS; do
            echo "Running tests for ${project}"
            dotnet test "$project" \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --results-directory TestResults \
              --logger "trx;LogFileName=$(basename "$project").trx"
          done

      - name: Test step summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run-tests.outcome }}" != "success" ]; then
            echo "Unit tests failed for ${{ matrix.service.service_dir }}."
          else
            echo "Unit tests passed for ${{ matrix.service.service_dir }}."
          fi

  portal-frontend-quality:
    needs: check-changes
    if: needs.check-changes.outputs.src-changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Defender.Portal/src/WebUI/ClientApp

    steps:
      - name: Skip unchanged Portal frontend
        if: needs.check-changes.outputs.portal-changed != 'true'
        working-directory: .
        run: echo "Portal build inputs unchanged; frontend quality gate not required."

      - name: Checkout code
        if: needs.check-changes.outputs.portal-changed == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        if: needs.check-changes.outputs.portal-changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/Defender.Portal/src/WebUI/ClientApp/package-lock.json

      - name: Install locked dependencies
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm ci

      - name: Audit dependencies
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm audit --audit-level=high

      - name: Type-check
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm run typecheck

      - name: Lint with zero warnings
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm run lint -- --max-warnings=0

      - name: Run tests
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm test

      - name: Build production bundle
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm run build

      - name: Install Playwright Chromium
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        if: needs.check-changes.outputs.portal-changed == 'true'
        run: npm run test:e2e

  build-and-publish:
    needs: [check-changes, portal-frontend-quality]
    if: (github.event_name == 'pull_request' || needs.check-changes.outputs.src-changed == 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.service == '' || github.event.inputs.service == 'ALL')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: "defender.portal"
            dockerfile: "Dockerfile.Portal"
            project_type: "WebUI"
            service_dir: "Defender.Portal"
          - name: "defender.portal-mcp"
            dockerfile: "Defender.Portal.Mcp/Dockerfile"
            project_type: "Node"
            service_dir: "Defender.Portal.Mcp"
          - name: "defender.user-management"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.UserManagementService"
          - name: "defender.wallet"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.WalletService"
          - name: "defender.risk-games"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.RiskGamesService"
          - name: "defender.notification"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.NotificationService"
          - name: "defender.personal-food-advisor"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.PersonalFoodAdvisor"
          - name: "defender.job-scheduler"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.JobSchedulerService"
          - name: "defender.identity"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.IdentityService"
          - name: "defender.budget-tracker"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.BudgetTracker"
          - name: "defender.health-care"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.HealthCareService"
          - name: "defender.travel-calendar"
            dockerfile: "Dockerfile.Service"
            project_type: "WebApi"
            service_dir: "Defender.TravelCalendarService"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get build info
        id: build-info
        run: |
          build_date=$(date +'%Y%m%d')
          build_number="${{ github.run_number }}"
          echo "build_date=$build_date" >> $GITHUB_OUTPUT
          echo "build_time=$(date +'%H%M%S')" >> $GITHUB_OUTPUT
          echo "build_number=$build_number" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          if [[ "${{ matrix.service.name }}" == "defender.portal" ]]; then
            portal_version=$(node -p "require('./src/Defender.Portal/src/WebUI/ClientApp/package.json').version")
            echo "portal_version=$portal_version" >> $GITHUB_OUTPUT
            echo "portal_release_tag=${build_date}-${build_number}_${portal_version}" >> $GITHUB_OUTPUT
          else
            echo "portal_version=not-portal" >> $GITHUB_OUTPUT
            echo "portal_release_tag=not-portal" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.build-info.outputs.build_date }}-${{ steps.build-info.outputs.build_number }}
            type=raw,value=${{ steps.build-info.outputs.portal_release_tag }},enable=${{ matrix.service.name == 'defender.portal' }}
            type=raw,value=${{ steps.build-info.outputs.build_date }}-${{ steps.build-info.outputs.build_time }}-${{ steps.build-info.outputs.short_sha }}

      - name: Print image tag
        run: |
          echo "Image tags: ${{ steps.meta.outputs.tags }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOTNET_VERSION=${{ env.DOTNET_VERSION }}
            SERVICE_DIR=${{ matrix.service.service_dir }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Scan built Docker image
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Output image info
        run: |
          echo "Built image: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  test-specific-service:
    needs: check-changes
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != '' && github.event.inputs.service != 'ALL' && needs.check-changes.outputs.src-changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK for tests
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.TEST_DOTNET_VERSION }}

      - name: Validate NuGet egress
        shell: bash
        run: |
          chmod +x scripts/check-nuget-egress.sh
          ./scripts/check-nuget-egress.sh

      - name: Determine service configuration
        id: service-config
        run: |
          SERVICE_NAME="${{ github.event.inputs.service }}"
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT

      - name: Run unit tests
        id: run-tests
        shell: bash
        run: |
          SERVICE_DIR="${{ steps.service-config.outputs.service_name }}"
          echo "Searching for test projects under src/${SERVICE_DIR}"
          TEST_PROJECTS=$(find "src/${SERVICE_DIR}" -type f \( -name "*Tests*.csproj" -o -name "*.Tests.csproj" \))

          if [ -z "$TEST_PROJECTS" ]; then
            echo "No test projects found for ${SERVICE_DIR}; skipping tests."
            exit 0
          fi

          mkdir -p TestResults
          for project in $TEST_PROJECTS; do
            echo "Running tests for ${project}"
            dotnet test "$project" \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --results-directory TestResults \
              --logger "trx;LogFileName=$(basename "$project").trx"
          done

      - name: Test step summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.run-tests.outcome }}" != "success" ]; then
            echo "Unit tests failed for ${{ steps.service-config.outputs.service_name }}."
          else
            echo "Unit tests passed for ${{ steps.service-config.outputs.service_name }}."
          fi

  # Additional job for building specific service when workflow_dispatch is used
  build-specific-service:
    needs: [check-changes, portal-frontend-quality]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.service != '' && github.event.inputs.service != 'ALL' && needs.check-changes.outputs.src-changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get build info
        id: build-info
        run: |
          build_date=$(date +'%Y%m%d')
          build_number="${{ github.run_number }}"
          echo "build_date=$build_date" >> $GITHUB_OUTPUT
          echo "build_time=$(date +'%H%M%S')" >> $GITHUB_OUTPUT
          echo "build_number=$build_number" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          if [[ "${{ github.event.inputs.service }}" == "Defender.Portal" ]]; then
            portal_version=$(node -p "require('./src/Defender.Portal/src/WebUI/ClientApp/package.json').version")
            echo "portal_version=$portal_version" >> $GITHUB_OUTPUT
            echo "portal_release_tag=${build_date}-${build_number}_${portal_version}" >> $GITHUB_OUTPUT
          else
            echo "portal_version=not-portal" >> $GITHUB_OUTPUT
            echo "portal_release_tag=not-portal" >> $GITHUB_OUTPUT
          fi

      - name: Determine service configuration
        id: service-config
        run: |
          SERVICE_NAME="${{ github.event.inputs.service }}"
          if [[ "$SERVICE_NAME" == "Defender.Portal" ]]; then
            echo "dockerfile=Dockerfile.Portal" >> $GITHUB_OUTPUT
            echo "project_type=WebUI" >> $GITHUB_OUTPUT
            echo "clean_name=defender.portal" >> $GITHUB_OUTPUT
          elif [[ "$SERVICE_NAME" == "Defender.Portal.Mcp" ]]; then
            echo "dockerfile=Defender.Portal.Mcp/Dockerfile" >> $GITHUB_OUTPUT
            echo "project_type=Node" >> $GITHUB_OUTPUT
            echo "clean_name=defender.portal-mcp" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=Dockerfile.Service" >> $GITHUB_OUTPUT
            echo "project_type=WebApi" >> $GITHUB_OUTPUT
            case "$SERVICE_NAME" in
              "Defender.UserManagementService") echo "clean_name=defender.user-management" >> $GITHUB_OUTPUT ;;
              "Defender.WalletService") echo "clean_name=defender.wallet" >> $GITHUB_OUTPUT ;;
              "Defender.RiskGamesService") echo "clean_name=defender.risk-games" >> $GITHUB_OUTPUT ;;
              "Defender.NotificationService") echo "clean_name=defender.notification" >> $GITHUB_OUTPUT ;;
              "Defender.JobSchedulerService") echo "clean_name=defender.job-scheduler" >> $GITHUB_OUTPUT ;;
              "Defender.IdentityService") echo "clean_name=defender.identity" >> $GITHUB_OUTPUT ;;
              "Defender.BudgetTracker") echo "clean_name=defender.budget-tracker" >> $GITHUB_OUTPUT ;;
              "Defender.HealthCareService") echo "clean_name=defender.health-care" >> $GITHUB_OUTPUT ;;
              "Defender.TravelCalendarService") echo "clean_name=defender.travel-calendar" >> $GITHUB_OUTPUT ;;
              *) echo "clean_name=$SERVICE_NAME" >> $GITHUB_OUTPUT ;;
            esac
          fi
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service-config.outputs.clean_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
            type=raw,value=${{ steps.build-info.outputs.build_date }}-${{ steps.build-info.outputs.build_number }}
            type=raw,value=${{ steps.build-info.outputs.portal_release_tag }},enable=${{ github.event.inputs.service == 'Defender.Portal' }}
            type=raw,value=${{ steps.build-info.outputs.build_date }}-${{ steps.build-info.outputs.build_time }}-${{ steps.build-info.outputs.short_sha }}

      - name: Print image tag
        run: |
          echo "Image tags: ${{ steps.meta.outputs.tags }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/${{ steps.service-config.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOTNET_VERSION=${{ env.DOTNET_VERSION }}
            SERVICE_DIR=${{ steps.service-config.outputs.service_name }}
          cache-from: type=gha,scope=${{ steps.service-config.outputs.clean_name }}
          cache-to: type=gha,mode=max,scope=${{ steps.service-config.outputs.clean_name }}

      - name: Output image info
        run: |
          echo "Built image: ${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service-config.outputs.clean_name }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
